<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <link rel="stylesheet" href="style.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
  <video autoplay loop muted plays-inline class="back-vid">
    <source src="images/galaxy.mp4" type="video/mp4">
  </video>
  
  <section class="main-section">
    <nav>
      <h1 data-aos="zoom-in" data-aos-duration="1000"><span style="color: #4acfee;">Contact</span> Me</h1>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="https://github.com/Pasinduhapuachchige?tab=repositories">Projects</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a class="active" href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <div class="contact-container">
      <!-- Contact Form -->
      <div class="contact-form" data-aos="fade-right" data-aos-duration="1000">
        <h2>Get In Touch</h2>
        <form id="contactForm">
          <div class="form-group">
            <input type="text" name="name" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" placeholder="Your Email" required>
          </div>
          <div class="form-group">
            <input type="text" name="subject" placeholder="Subject">
          </div>
          <div class="form-group">
            <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
          </div>
          <button type="submit" class="btn">Send Message <i class='bx bx-send'></i></button>
        </form>
      </div>
      
      <!-- Contact Info -->
      <div class="contact-info" data-aos="fade-left" data-aos-duration="1000">
        <h2>Contact Information</h2>
        <div class="info-item">
          <i class='bx bx-envelope'></i>
          <div>
            <h3>Email</h3>
            <p>dilmin236@gmail.com</p>
          </div>
        </div>
        <div class="info-item">
          <i class='bx bx-phone'></i>
          <div>
            <h3>Phone</h3>
            <p>+94 768868403</p>
          </div>
        </div>
        <div class="info-item">
          <i class='bx bx-map'></i>
          <div>
            <h3>Location</h3>
            <p>Horana, Sri Lanka</p>
          </div>
        </div>
        
        <div class="social-links">
          <a href="https://github.com/Pasinduhapuachchige" target="_blank"><i class='bx bxl-github'></i></a>
          <a href="https://www.linkedin.com/in/pasindu-hapuachchige-7b600029a" target="_blank"><i class='bx bxl-linkedin'></i></a>
          <a href="mailto:your.dilmin236@gmail.com"><i class='bx bx-envelope'></i></a>
        </div>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init();
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = e.target;
      const formData = {
        name: form.name.value,
        email: form.email.value,
        subject: form.subject.value,
        message: form.message.value
      };
      fetch('/.netlify/functions/sendMail', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      })
      .then(res => res.json())
      .then(data => {
        alert(data.message);
        form.reset();
      })
      .catch(() => {
        alert('There was a problem sending your message. Please try again later.');
      });
    });
  </script>
</body>
</html>
